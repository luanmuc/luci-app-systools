name: Build Packages
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OpenWrt 版本（all 表示全部编译）'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - '24.12'
          - '25.12'
env:
  FEED_NAME: systools
  PKG_NAME: luci-app-systools
  PKG_VERSION: '1.0.0'
jobs:
  build:
    name: Build ${{ matrix.openwrt_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_version: '24.12'
            package_format: 'ipk'
            sdk_target: 'x86/64'
          - openwrt_version: '25.12'
            package_format: 'apk'
            sdk_target: 'x86/64'
    # 支持选择单个版本编译
    if: ${{ github.event.inputs.version == 'all' || github.event.inputs.version == matrix.openwrt_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 打印环境信息
        run: |
          echo "==================== 环境信息 ===================="
          echo "操作系统: $(cat /etc/os-release | head -1)"
          echo "内核版本: $(uname -r)"
          echo "CPU: $(nproc) 核"
          echo "内存: $(free -h | grep Mem | awk '{print $2}')"
          echo "磁盘空间:"
          df -h | grep -E '^/dev/|Filesystem'
          echo ""
          echo "GitHub 信息:"
          echo "  仓库: ${{ github.repository }}"
          echo "  分支: ${{ github.ref_name }}"
          echo "  提交: ${{ github.sha }}"
          echo "  触发者: ${{ github.triggering_actor }}"
          echo ""
          echo "构建参数:"
          echo "  OpenWrt 版本: ${{ matrix.openwrt_version }}"
          echo "  包格式: ${{ matrix.package_format }}"
          echo "  SDK 目标: ${{ matrix.sdk_target }}"
          echo "=================================================="

      - name: Download SDK
        run: |
          echo "==================== 下载 SDK ===================="
          VERSION=${{ matrix.openwrt_version }}
          TARGET=${{ matrix.sdk_target }}
          # SDK 下载 URL
          SDK_FILE="openwrt-sdk-${VERSION}-${TARGET//\//_}_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
          SDK_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SDK_FILE}"
          echo "SDK 文件名: $SDK_FILE"
          echo "SDK 下载地址: $SDK_URL"
          echo ""
          echo "正在下载 SDK..."
          curl -fSL "$SDK_URL" -o sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk
          echo "SDK 下载成功"
          echo "SDK 大小: $(du -h sdk.tar.xz | cut -f1)"
          echo ""
          echo "SDK 目录内容:"
          ls -la sdk/
          echo "=================================================="

      - name: Prepare Package
        run: |
          echo "==================== 准备包 ===================="
          SDK_DIR=$(pwd)/sdk
          PKG_DIR=$(pwd)
          echo "SDK 目录: $SDK_DIR"
          echo "包源码目录: $PKG_DIR"
          echo ""
          # 创建 package 目录
          mkdir -p $SDK_DIR/package/$FEED_NAME
          echo "已创建 package/$FEED_NAME 目录"
          # 复制插件源码
          cp -r $PKG_DIR/* $SDK_DIR/package/$FEED_NAME/
          echo "已复制插件源码"
          echo ""
          echo "包目录内容:"
          ls -la $SDK_DIR/package/$FEED_NAME/
          echo "=================================================="

      - name: Build Package
        run: |
          echo "==================== 构建包 ===================="
          SDK_DIR=$(pwd)/sdk
          FORMAT=${{ matrix.package_format }}
          VERSION=${{ matrix.openwrt_version }}
          # 创建输出目录
          mkdir -p output
          echo "构建参数:"
          echo "  格式: $FORMAT"
          echo "  版本: $VERSION"
          echo ""
          echo "开始编译..."
          cd $SDK_DIR
          
          # 更新 feeds 索引
          ./scripts/feeds update -a 2>&1 | head -50
          
          # 编译包
          make package/$FEED_NAME/compile V=s 2>&1 | tee build.log
          
          # 查找生成的包
          cd ..
          if [ "$FORMAT" = "ipk" ]; then
            find sdk/bin -name "${PKG_NAME}_*.ipk" -type f 2>/dev/null | head -1 | xargs -I {} cp {} output/
          else
            find sdk/bin -name "${PKG_NAME}-*.apk" -type f 2>/dev/null | head -1 | xargs -I {} cp {} output/
          fi
          
          # 检查是否成功生成
          if [ -z "$(ls -A output/ 2>/dev/null)" ]; then
            echo "错误: 编译失败，未生成包文件"
            exit 1
          fi
          
          echo ""
          echo "构建成功！"
          echo ""
          echo "产物列表:"
          ls -la output/
          echo ""
          echo "文件大小:"
          du -h output/*
          echo ""
          echo "包内文件列表:"
          if [ "$FORMAT" = "ipk" ]; then
            tar -tzf output/*.ipk 2>/dev/null | head -30 || echo "无法列出"
          else
            echo "apk 包内容:"
            apk info -L output/*.apk 2>/dev/null | head -30 || echo "无法列出"
          fi
          echo "=================================================="

      - name: 构建失败诊断
        if: failure()
        run: |
          echo "==================== 构建失败诊断 ===================="
          echo ""
          echo "--- 系统资源 ---"
          echo "内存使用:"
          free -h
          echo ""
          echo "磁盘使用:"
          df -h
          echo ""
          echo "进程列表（前 20）:"
          ps aux --sort=-%mem | head -20
          echo ""
          echo "--- SDK 目录 ---"
          if [ -d sdk ]; then
            echo "SDK 目录大小: $(du -sh sdk 2>/dev/null || echo 'N/A')"
            echo "SDK 目录结构:"
            find sdk -maxdepth 3 -type d 2>/dev/null | head -30
          else
            echo "SDK 目录不存在"
          fi
          echo ""
          echo "--- 构建日志（最后 200 行）---"
          if [ -f sdk/build.log ]; then
            tail -200 sdk/build.log
          else
            echo "未找到构建日志文件"
          fi
          echo ""
          echo "--- 环境变量 ---"
          env | grep -i -E 'openwrt|sdk|pkg|feed' | sort
          echo "=================================================="

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.openwrt_version }}
          path: output/*
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出构建产物
        run: |
          echo "==================== 构建产物 ===================="
          echo ""
          echo "所有产物文件:"
          find artifacts/ -type f \( -name "*.ipk" -o -name "*.apk" \)
          echo ""
          echo "文件详情:"
          ls -lh artifacts/*/
          echo ""
          echo "总大小:"
          du -sh artifacts/
          echo "=================================================="

      - name: Generate Release Notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cat > release_notes.md << EOF
          ## 工具箱 v${VERSION}
          
          ### 版本信息
          - **版本号**：v${VERSION}
          - **发布时间**：$(date +%Y-%m-%d)
          - **提交**：${GITHUB_SHA::7}
          
          ### 支持的 OpenWrt 版本
          - OpenWrt 24.12（ipk 包格式）
          - OpenWrt 25.12（apk 包格式）
          
          ### 架构支持
          - 纯脚本/Lua 实现，架构无关（all）
          - 支持所有 OpenWrt 兼容架构
          
          ### 安装方法
          
          #### OpenWrt 24.12（ipk）
          \`\`\`bash
          # 上传 ipk 文件到路由器后执行
          opkg update
          opkg install luci-app-systools_${VERSION}-1_all.ipk
          \`\`\`
          
          #### OpenWrt 25.12（apk）
          \`\`\`bash
          # 上传 apk 文件到路由器后执行
          apk update
          apk add luci-app-systools-${VERSION}-r0.apk --allow-untrusted
          \`\`\`
          
          ### 安装后
          1. 刷新 LuCI 页面
          2. 在菜单中找到「系统」→「工具箱」
          3. 开始使用
          
          ### 主要功能
          
          #### 网络向导类
          - 上网设置向导（PPPoE / DHCP / 静态IP）
          - IPv6 一键设置（Native / 6to4 / 6in4 / 中继 / 禁用）
          - 旁路由模式（一键切换旁路网关）
          - 设备管理（设备列表、备注名、静态IP绑定）
          
          #### 智能家居类
          - Home Assistant 管理（状态、启停、日志、备份）
          - HA 镜像管理（镜像列表、拉取、删除、国内加速）
          - HA 存储设置（U盘迁移、挂载管理）
          - HA 网络设置（端口管理、mDNS、UPnP）
          
          ### 其他特性
          - 多版本兼容（24.12 / 25.12）
          - Argon 主题深度适配
          - 暗色模式支持
          - 纯脚本/Lua 实现，架构无关
          
          ### 注意事项
          - 首次安装后 uhttpd 会自动重启
          - 如遇问题请提交 Issue
          EOF
          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 工具箱 ${{ github.ref_name }}
          body_path: release_notes.md
          prerelease: false
          generate_release_notes: false
          files: |
            artifacts/**/*.ipk
            artifacts/**/*.apk
