name: Build luci-app-systools 工具箱插件
on:
  workflow_dispatch:
    inputs:
      version:
        description: '选择要编译的 OpenWrt 版本'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - '24.12'
          - '25.12'
  push:
    tags:
      - 'v*'
env:
  FEED_NAME: systools
  PKG_NAME: luci-app-systools
  PKG_VERSION: '1.0.0'
jobs:
  build:
    name: Build ${{ matrix.openwrt_version }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_version: '24.12'
            package_format: 'ipk'
            sdk_target: 'x86/64'
          - openwrt_version: '25.12'
            package_format: 'apk'
            sdk_target: 'x86/64'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 缓存 SDK 和 dl 目录
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            sdk
            sdk/dl
          key: ${{ runner.os }}-sdk-${{ matrix.openwrt_version }}-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-sdk-${{ matrix.openwrt_version }}-
            ${{ runner.os }}-sdk-

      - name: 打印环境信息
        run: |
          echo "==================== 环境信息 ===================="
          echo "操作系统: $(cat /etc/os-release | head -1)"
          echo "内核版本: $(uname -r)"
          echo "CPU: $(nproc) 核"
          echo "内存: $(free -h | grep Mem | awk '{print $2}')"
          echo "磁盘空间:"
          df -h | grep -E '^/dev/|Filesystem'
          echo ""
          echo "GitHub 信息:"
          echo "  仓库: ${{ github.repository }}"
          echo "  分支: ${{ github.ref_name }}"
          echo "  提交: ${{ github.sha }}"
          echo "  触发者: ${{ github.triggering_actor }}"
          echo ""
          echo "构建参数:"
          echo "  OpenWrt 版本: ${{ matrix.openwrt_version }}"
          echo "  包格式: ${{ matrix.package_format }}"
          echo "  SDK 目标: ${{ matrix.sdk_target }}"
          echo "=================================================="

      - name: Download SDK
        if: steps.cache.outputs.cache-hit != 'true'
        id: sdk_download
        run: |
          echo "==================== 下载 SDK ===================="
          VERSION=${{ matrix.openwrt_version }}
          TARGET=${{ matrix.sdk_target }}
          # SDK 下载 URL
          SDK_FILE="openwrt-sdk-${VERSION}-${TARGET//\//_}_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
          SDK_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${TARGET}/${SDK_FILE}"
          echo "SDK 文件名: $SDK_FILE"
          echo "SDK 下载地址: $SDK_URL"
          echo ""
          echo "正在下载 SDK..."
          curl -fSL --retry 3 --retry-delay 5 "$SDK_URL" -o sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk
          echo "SDK 下载成功"
          echo "SDK 大小: $(du -h sdk.tar.xz | cut -f1)"
          echo ""
          echo "SDK 目录内容:"
          ls -la sdk/
          echo "=================================================="

      - name: Prepare Package
        run: |
          echo "==================== 准备包 ===================="
          SDK_DIR=$(pwd)/sdk
          PKG_DIR=$(pwd)
          echo "SDK 目录: $SDK_DIR"
          echo "包源码目录: $PKG_DIR"
          echo ""
          # 创建 package 目录
          mkdir -p $SDK_DIR/package/$FEED_NAME
          echo "已创建 package/$FEED_NAME 目录"
          # 复制插件源码
          cp -r $PKG_DIR/* $SDK_DIR/package/$FEED_NAME/
          echo "已复制插件源码"
          echo ""
          echo "包目录内容:"
          ls -la $SDK_DIR/package/$FEED_NAME/
          echo "=================================================="

      - name: Build Package
        run: |
          echo "==================== 构建包 ===================="
          SDK_DIR=$(pwd)/sdk
          FORMAT=${{ matrix.package_format }}
          VERSION=${{ matrix.openwrt_version }}
          # 创建输出目录
          mkdir -p output
          echo "构建参数:"
          echo "  格式: $FORMAT"
          echo "  版本: $VERSION"
          echo ""
          echo "开始编译..."
          cd $SDK_DIR
          
          # 更新 feeds 索引
          ./scripts/feeds update -a 2>&1 | head -50
          
          # 编译包
          make package/$FEED_NAME/compile V=s 2>&1 | tee build.log
          
          # 查找生成的包
          cd ..
          if [ "$FORMAT" = "ipk" ]; then
            # 多种匹配模式，确保能找到
            PKG_FILE=$(find sdk/bin -name "${PKG_NAME}_*.ipk" -type f 2>/dev/null | head -1)
            if [ -z "$PKG_FILE" ]; then
              PKG_FILE=$(find sdk/bin -name "*${PKG_NAME}*.ipk" -type f 2>/dev/null | head -1)
            fi
            if [ -n "$PKG_FILE" ]; then
              cp "$PKG_FILE" output/
            fi
          else
            # 多种匹配模式，确保能找到 apk 包
            PKG_FILE=$(find sdk/bin -name "${PKG_NAME}-*.apk" -type f 2>/dev/null | head -1)
            if [ -z "$PKG_FILE" ]; then
              PKG_FILE=$(find sdk/bin -name "*${PKG_NAME}*.apk" -type f 2>/dev/null | head -1)
            fi
            if [ -n "$PKG_FILE" ]; then
              cp "$PKG_FILE" output/
            fi
          fi
          
          # 检查是否成功生成
          if [ -z "$(ls -A output/ 2>/dev/null)" ]; then
            echo "错误: 编译失败，未生成包文件"
            exit 1
          fi
          
          echo ""
          echo "构建成功！"
          echo ""
          echo "产物列表:"
          ls -la output/
          echo ""
          echo "文件大小:"
          du -h output/*
          echo ""
          echo "包内文件列表:"
          if [ "$FORMAT" = "ipk" ]; then
            tar -tzf output/*.ipk 2>/dev/null | head -30 || echo "无法列出"
          else
            echo "apk 包内容:"
            apk info -L output/*.apk 2>/dev/null | head -30 || echo "无法列出"
          fi
          echo "=================================================="

      - name: 构建失败诊断
        if: failure()
        run: |
          echo "==================== 构建失败诊断 ===================="
          echo ""
          echo "--- 系统资源 ---"
          echo "内存使用:"
          free -h
          echo ""
          echo "磁盘使用:"
          df -h
          echo ""
          echo "进程列表（前 20）:"
          ps aux --sort=-%mem | head -20
          echo ""
          echo "--- SDK 目录 ---"
          if [ -d sdk ]; then
            echo "SDK 目录大小: $(du -sh sdk 2>/dev/null || echo 'N/A')"
            echo "SDK 目录结构:"
            find sdk -maxdepth 3 -type d 2>/dev/null | head -30
          else
            echo "SDK 目录不存在"
          fi
          echo ""
          echo "--- 构建日志（最后 200 行）---"
          if [ -f sdk/build.log ]; then
            tail -200 sdk/build.log
          else
            echo "未找到构建日志文件"
          fi
          echo ""
          echo "--- 环境变量 ---"
          env | grep -i -E 'openwrt|sdk|pkg|feed' | sort
          echo "=================================================="

      - name: 产物校验
        run: |
          echo "==================== 产物校验 ===================="
          FORMAT=${{ matrix.package_format }}
          PKG_FILE=$(ls output/* 2>/dev/null | head -1)
          
          if [ -z "$PKG_FILE" ]; then
            echo "错误: 未找到产物文件"
            exit 1
          fi
          
          echo "校验文件: $PKG_FILE"
          echo ""
          
          ERROR_COUNT=0
          
          if [ "$FORMAT" = "ipk" ]; then
            echo "--- 检查 ipk 包结构 ---"
            # 检查控制文件
            if tar -tzf "$PKG_FILE" | grep -q "control.tar.gz"; then
              echo "✓ control.tar.gz 存在"
            else
              echo "✗ control.tar.gz 不存在"
              ERROR_COUNT=$((ERROR_COUNT + 1))
            fi
            # 检查数据文件
            if tar -tzf "$PKG_FILE" | grep -q "data.tar.gz"; then
              echo "✓ data.tar.gz 存在"
            else
              echo "✗ data.tar.gz 不存在"
              ERROR_COUNT=$((ERROR_COUNT + 1))
            fi
            
            # 解压检查关键文件
            echo ""
            echo "--- 检查关键文件 ---"
            mkdir -p /tmp/ipk-check
            tar -xzf "$PKG_FILE" -C /tmp/ipk-check
            
            # 检查控制文件
            if tar -tzf /tmp/ipk-check/control.tar.gz | grep -q "./control"; then
              echo "✓ 控制文件 (control) 存在"
            else
              echo "✗ 控制文件 (control) 不存在"
              ERROR_COUNT=$((ERROR_COUNT + 1))
            fi
            
            # 检查 Lua 文件
            if tar -tzf /tmp/ipk-check/data.tar.gz | grep -q "systools.lua"; then
              echo "✓ Lua 控制器文件存在"
            else
              echo "✗ Lua 控制器文件不存在"
              ERROR_COUNT=$((ERROR_COUNT + 1))
            fi
            
            # 检查 Shell 脚本
            if tar -tzf /tmp/ipk-check/data.tar.gz | grep -q "systools.*\.sh"; then
              echo "✓ Shell 脚本文件存在"
            else
              echo "✗ Shell 脚本文件不存在"
              ERROR_COUNT=$((ERROR_COUNT + 1))
            fi
            
            # 检查配置文件
            if tar -tzf /tmp/ipk-check/data.tar.gz | grep -q "config/systools"; then
              echo "✓ UCI 配置文件存在"
            else
              echo "✗ UCI 配置文件不存在"
              ERROR_COUNT=$((ERROR_COUNT + 1))
            fi
            
            rm -rf /tmp/ipk-check
          else
            echo "--- 检查 apk 包结构 ---"
            # apk 格式校验
            if command -v apk >/dev/null 2>&1; then
              apk info -L "$PKG_FILE" > /tmp/apk-list.txt 2>/dev/null
              
              # 检查控制文件
              if grep -q ".PKGINFO" /tmp/apk-list.txt; then
                echo "✓ .PKGINFO 控制文件存在"
              else
                echo "✗ .PKGINFO 控制文件不存在"
                ERROR_COUNT=$((ERROR_COUNT + 1))
              fi
              
              # 检查 Lua 文件
              if grep -q "systools.lua" /tmp/apk-list.txt; then
                echo "✓ Lua 控制器文件存在"
              else
                echo "✗ Lua 控制器文件不存在"
                ERROR_COUNT=$((ERROR_COUNT + 1))
              fi
              
              # 检查 Shell 脚本
              if grep -q "systools.*\.sh" /tmp/apk-list.txt; then
                echo "✓ Shell 脚本文件存在"
              else
                echo "✗ Shell 脚本文件不存在"
                ERROR_COUNT=$((ERROR_COUNT + 1))
              fi
              
              # 检查配置文件
              if grep -q "config/systools" /tmp/apk-list.txt; then
                echo "✓ UCI 配置文件存在"
              else
                echo "✗ UCI 配置文件不存在"
                ERROR_COUNT=$((ERROR_COUNT + 1))
              fi
              
              rm -f /tmp/apk-list.txt
            else
              echo "⚠ apk 命令不可用，跳过详细校验"
              # 基础文件存在性检查
              if [ -s "$PKG_FILE" ]; then
                echo "✓ apk 文件非空"
              else
                echo "✗ apk 文件为空"
                ERROR_COUNT=$((ERROR_COUNT + 1))
              fi
            fi
          fi
          
          echo ""
          echo "校验结果: $ERROR_COUNT 个错误"
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "错误: 产物校验失败"
            exit 1
          fi
          echo "✓ 产物校验通过"
          echo "=================================================="
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.openwrt_version }}
          path: output/*
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出构建产物
        run: |
          echo "==================== 构建产物 ===================="
          echo ""
          echo "所有产物文件:"
          find artifacts/ -type f \( -name "*.ipk" -o -name "*.apk" \)
          echo ""
          echo "文件详情:"
          ls -lh artifacts/*/
          echo ""
          echo "总大小:"
          du -sh artifacts/
          echo "=================================================="

      - name: Generate Release Notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cat > release_notes.md << EOF
          ## 工具箱 v${VERSION}
          
          ### 版本信息
          - **版本号**：v${VERSION}
          - **发布时间**：$(date +%Y-%m-%d)
          - **提交**：${GITHUB_SHA::7}
          
          ### 支持的 OpenWrt 版本
          - OpenWrt 24.12（ipk 包格式）
          - OpenWrt 25.12（apk 包格式）
          
          ### 架构支持
          - 纯脚本/Lua 实现，架构无关（all）
          - 支持所有 OpenWrt 兼容架构
          
          ### 安装方法
          
          #### OpenWrt 24.12（ipk）
          \`\`\`bash
          # 上传 ipk 文件到路由器后执行
          opkg update
          opkg install luci-app-systools_${VERSION}-1_all.ipk
          \`\`\`
          
          #### OpenWrt 25.12（apk）
          \`\`\`bash
          # 上传 apk 文件到路由器后执行
          apk update
          apk add luci-app-systools-${VERSION}-r0.apk --allow-untrusted
          \`\`\`
          
          ### 安装后
          1. 刷新 LuCI 页面
          2. 在菜单中找到「服务」→「工具箱」
          3. 开始使用
          
          ### 主要功能
          
          #### 网络向导类
          - 上网设置向导（PPPoE / DHCP / 静态IP）
          - IPv6 一键设置（Native / 6to4 / 6in4 / 中继 / 禁用）
          - 旁路由模式（一键切换旁路网关）
          - 设备管理（设备列表、备注名、静态IP绑定）
          
          #### 智能家居类
          - Home Assistant 管理（状态、启停、日志、备份）
          - HA 镜像管理（镜像列表、拉取、删除、国内加速）
          - HA 存储设置（U盘迁移、挂载管理）
          - HA 网络设置（端口管理、mDNS、UPnP）
          
          ### 其他特性
          - 多版本兼容（24.12 / 25.12）
          - Argon 主题深度适配
          - 暗色模式支持
          - 纯脚本/Lua 实现，架构无关
          
          ### 注意事项
          - 首次安装后 uhttpd 会自动重启
          - 如遇问题请提交 Issue
          EOF
          cat release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 工具箱 ${{ github.ref_name }}
          body_path: release_notes.md
          prerelease: false
          generate_release_notes: false
          files: |
            artifacts/**/*.ipk
            artifacts/**/*.apk
